<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MSU PRS Poll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-100 p-5 flex flex-col items-center font-sans">
    <div class="w-full max-w-md bg-white p-6 rounded-xl shadow-lg mb-10">
        <h1 class="text-xl font-bold mb-4 text-center">Audience Vote</h1>
        <div class="grid grid-cols-1 gap-3">
            <button onclick="vote('A')" class="p-4 bg-indigo-600 text-white rounded-lg font-bold">Option A</button>
            <button onclick="vote('B')" class="p-4 bg-indigo-600 text-white rounded-lg font-bold">Option B</button>
            <button onclick="vote('C')" class="p-4 bg-indigo-600 text-white rounded-lg font-bold">Option C</button>
        </div>
    </div>

    <div class="w-full max-w-xl bg-slate-800 text-white p-6 rounded-xl shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold">Results Dashboard</h2>
            <button id="pBtn" onclick="toggle()" class="px-4 py-2 bg-red-500 rounded font-bold">Close Poll</button>
        </div>
        <div id="res" class="opacity-20 transition-all duration-500 pointer-events-none">
            <div id="bar-A" class="h-4 bg-indigo-400 rounded-full mb-4" style="width:0%"></div>
            <div id="bar-B" class="h-4 bg-indigo-400 rounded-full mb-4" style="width:0%"></div>
            <div id="bar-C" class="h-4 bg-indigo-400 rounded-full mb-4" style="width:0%"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY62kq6vWtdhyJiNK3bjqtJFFRwy8rZZg",
            databaseURL: "https://live-polling-msu-prs-default-rtdb.firebaseio.com",
            projectId: "live-polling-msu-prs"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let open = true;

        function vote(l) { if(open) db.ref('votes/'+l).transaction(c=>(c||0)+1); alert('Voted '+l); }
        function toggle() { open = !open; db.ref('set/status').set(open); }

        db.ref('set/status').on('value', s => {
            open = s.val() !== false;
            document.getElementById('pBtn').innerText = open ? "Close Poll" : "Open Poll";
            document.getElementById('res').style.opacity = open ? "0.2" : "1.0";
        });

        db.ref('votes').on('value', s => {
            const d = s.val() || {A:0,B:0,C:0};
            const t = Object.values(d).reduce((a,b)=>a+b,0);
            ['A','B','C'].forEach(l => {
                const p = t > 0 ? (d[l]||0)/t*100 : 0;
                document.getElementById('bar-'+l).style.width = p+'%';
            });
        });
    </script>
</body>
</html>

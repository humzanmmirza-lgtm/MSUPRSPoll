<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSU PRS Live Poll</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 pt-10 font-sans text-slate-900">

    <div id="voter-section" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <h1 class="text-2xl font-bold text-center mb-2">Live Audience Poll</h1>
        <p class="text-slate-500 text-center mb-8 text-sm">Select an option to cast your vote</p>
        <div id="closed-msg" class="hidden text-center p-4 mb-4 bg-amber-50 text-amber-700 rounded-lg font-medium border border-amber-200">Polling is closed.</div>
        <div class="grid grid-cols-1 gap-4" id="options-container">
            <button onclick="castVote('A')" class="vote-btn p-5 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 active:scale-95 transition-all shadow-md">Option A</button>
            <button onclick="castVote('B')" class="vote-btn p-5 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 active:scale-95 transition-all shadow-md">Option B</button>
            <button onclick="castVote('C')" class="vote-btn p-5 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 active:scale-95 transition-all shadow-md">Option C</button>
            <button onclick="castVote('D')" class="vote-btn p-5 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 active:scale-95 transition-all shadow-md">Option D</button>
        </div>
    </div>

    <div id="presenter-section" class="w-full max-w-2xl mt-12 bg-slate-900 text-white p-8 rounded-2xl shadow-2xl">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Presenter Dashboard</h2>
            <button id="toggle-poll" onclick="togglePoll()" class="px-6 py-2 bg-red-500 rounded-lg font-bold hover:bg-red-600 transition shadow-lg">Close Polling</button>
        </div>
        <div id="results-display" class="space-y-6 opacity-25 grayscale transition-all duration-700 pointer-events-none">
            <div id="bars-html"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY62kq6vWtdhyJiNK3bjqtJFFRwy8rZZg",
            authDomain: "live-polling-msu-prs.firebaseapp.com",
            databaseURL: "https://live-polling-msu-prs-default-rtdb.firebaseio.com",
            projectId: "live-polling-msu-prs",
            storageBucket: "live-polling-msu-prs.firebasestorage.app",
            messagingSenderId: "267359802207",
            appId: "1:267359802207:web:a5cff63a79db3866169cea",
            measurementId: "G-MBJNEXE6HX"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isPollOpen = true;

        const options = ['A', 'B', 'C', 'D'];
        const barsContainer = document.getElementById('bars-html');
        options.forEach(letter => {
            barsContainer.innerHTML += `<div class="relative mb-4"><div class="flex mb-1 justify-between text-xs font-bold uppercase"><span>Option ${letter}</span><span id="count-${letter}">0</span></div><div class="h-3 rounded-full bg-slate-800"><div id="bar-${letter}" style="width:0%" class="h-full bg-indigo-500 rounded-full transition-all duration-1000"></div></div></div>`;
        });

        function togglePoll() { db.ref('settings/status').set(!isPollOpen); }

        db.ref('settings/status').on('value', (snapshot) => {
            isPollOpen = snapshot.val() !== false;
            document.getElementById('toggle-poll').innerText = isPollOpen ? "Close Polling" : "Open Polling";
            document.getElementById('toggle-poll').className = isPollOpen ? "px-6 py-2 bg-red-500 rounded-lg font-bold hover:bg-red-600 transition shadow-lg" : "px-6 py-2 bg-emerald-500 rounded-lg font-bold hover:bg-emerald-600 transition shadow-lg";
            document.getElementById('results-display').className = isPollOpen ? "space-y-6 opacity-25 grayscale transition-all duration-700 pointer-events-none" : "space-y-6 transition-all duration-700";
            document.getElementById('closed-msg').classList.toggle('hidden', isPollOpen);
        });

        function castVote(letter) {
            if(!isPollOpen) return;
            db.ref('votes/' + letter).transaction(c => (c || 0) + 1);
            alert("Vote for " + letter + " cast!");
        }

        db.ref('votes').on('value', (snapshot) => {
            const data = snapshot.val() || {A:0, B:0, C:0, D:0};
            const total = Object.values(data).reduce((a, b) => a + b, 0);
            options.forEach(letter => {
                const count = data[letter] || 0;
                const pct = total > 0 ? (count / total * 100) : 0;
                document.getElementById(`count-${letter}`).innerText = count + " (" + Math.round(pct) + "%)";
                document.getElementById(`bar-${letter}`).style.width = pct + "%";
            });
        });
    </script>
</body>
</html>
